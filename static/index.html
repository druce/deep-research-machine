<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRA5 — Stock Research Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #060a12;
      --surface:     #0b1221;
      --surface-2:   #101a2e;
      --surface-3:   #152240;
      --border:      #1a2540;
      --border-lit:  #243660;

      --cyan:        #00d4ff;
      --cyan-mid:    rgba(0, 212, 255, 0.35);
      --cyan-dim:    rgba(0, 212, 255, 0.08);
      --cyan-glow:   0 0 12px rgba(0, 212, 255, 0.5), 0 0 40px rgba(0, 212, 255, 0.1);

      --green:       #00f590;
      --green-dim:   rgba(0, 245, 144, 0.08);
      --green-glow:  0 0 10px rgba(0, 245, 144, 0.5);

      --amber:       #ffb347;
      --amber-dim:   rgba(255, 179, 71, 0.08);
      --amber-glow:  0 0 10px rgba(255, 179, 71, 0.5);

      --red:         #ff4466;
      --red-dim:     rgba(255, 68, 102, 0.08);
      --red-glow:    0 0 10px rgba(255, 68, 102, 0.5);

      --text:        #e0ecff;
      --text-mid:    #7da0c4;
      --text-dim:    #4a6a8a;

      --font-ui:     'Outfit', system-ui, sans-serif;
      --font-mono:   'JetBrains Mono', 'SF Mono', monospace;

      --sidebar-w:   220px;
      --header-h:    56px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    /* Dot-grid background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(0, 212, 255, 0.045) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 800px 500px at 5% 0%,  rgba(0, 212, 255, 0.035) 0%, transparent 70%),
        radial-gradient(ellipse 600px 800px at 95% 95%, rgba(0, 245, 144, 0.02) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ═══════════ HEADER ═══════════ */
    .header {
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border-lit);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      flex-shrink: 0;
      position: relative;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--cyan-mid) 30%, var(--cyan-mid) 70%, transparent 100%);
    }

    .logo {
      font-weight: 700;
      font-size: 17px;
      letter-spacing: 1.5px;
      color: var(--cyan);
      text-shadow: var(--cyan-glow);
      user-select: none;
    }

    .logo span {
      color: var(--text-dim);
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 0.5px;
      margin-left: 8px;
    }

    .header-spacer { flex: 1; }

    .ticker-form {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ticker-input {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 500;
      background: var(--bg);
      border: 1px solid var(--border-lit);
      color: var(--text);
      padding: 7px 12px;
      width: 120px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .ticker-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 2px var(--cyan-dim), var(--cyan-glow);
    }

    .ticker-input::placeholder {
      color: var(--text-dim);
      text-transform: none;
      letter-spacing: 0;
      font-weight: 300;
    }

    .run-btn {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 8px 20px;
      background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,212,255,0.05));
      color: var(--cyan);
      border: 1px solid rgba(0,212,255,0.3);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .run-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, rgba(0,212,255,0.25), rgba(0,212,255,0.10));
      box-shadow: var(--cyan-glow);
      border-color: var(--cyan);
    }

    .run-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .run-btn.running {
      color: var(--amber);
      border-color: rgba(255,179,71,0.3);
      background: linear-gradient(135deg, rgba(255,179,71,0.12), rgba(255,179,71,0.04));
    }

    /* ═══════════ BODY LAYOUT ═══════════ */
    .body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ═══════════ SIDEBAR ═══════════ */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    .sidebar-title {
      padding: 14px 16px 10px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 12px;
    }

    .sidebar-list::-webkit-scrollbar { width: 4px; }
    .sidebar-list::-webkit-scrollbar-track { background: transparent; }
    .sidebar-list::-webkit-scrollbar-thumb { background: var(--border-lit); border-radius: 2px; }

    .report-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
    }

    .report-item:hover {
      background: var(--surface-2);
      border-color: var(--border);
    }

    .report-ticker {
      font-family: var(--font-mono);
      font-weight: 500;
      font-size: 13px;
      color: var(--cyan);
      min-width: 48px;
    }

    .report-date {
      font-size: 11px;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
    }

    .report-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: var(--green-glow);
      flex-shrink: 0;
    }

    .sidebar-empty {
      padding: 20px 16px;
      font-size: 12px;
      color: var(--text-dim);
      font-style: italic;
    }

    /* ═══════════ MAIN AREA ═══════════ */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* Status Panel */
    .status-panel {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      flex-shrink: 0;
    }

    .status-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .status-ticker {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 600;
      color: var(--cyan);
      text-shadow: var(--cyan-glow);
      letter-spacing: 1px;
    }

    .status-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 3px;
    }

    .status-label.idle     { color: var(--text-dim); background: var(--surface-2); }
    .status-label.running  { color: var(--amber); background: var(--amber-dim); }
    .status-label.complete { color: var(--green); background: var(--green-dim); }
    .status-label.failed   { color: var(--red); background: var(--red-dim); }

    .status-spacer { flex: 1; }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-pct {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-mid);
      min-width: 36px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .progress-bar {
      width: 180px;
      height: 6px;
      background: var(--surface-3);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--cyan) 0%, var(--green) 100%);
      transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* Task Grid */
    .task-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 6px;
    }

    .task-cell {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      border-radius: 4px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      transition: border-color 0.3s, background 0.3s;
      min-height: 30px;
    }

    .task-cell.complete { border-color: rgba(0,245,144,0.2); background: var(--green-dim); }
    .task-cell.running  { border-color: rgba(255,179,71,0.25); background: var(--amber-dim); }
    .task-cell.failed   { border-color: rgba(255,68,102,0.25); background: var(--red-dim); }

    .task-icon {
      font-size: 11px;
      width: 16px;
      text-align: center;
      flex-shrink: 0;
    }

    .task-icon.pending  { color: var(--text-dim); }
    .task-icon.running  { color: var(--amber); }
    .task-icon.complete { color: var(--green); text-shadow: var(--green-glow); }
    .task-icon.failed   { color: var(--red); text-shadow: var(--red-glow); }

    .pulse-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--amber);
      box-shadow: var(--amber-glow);
      animation: pulse 1.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.7); }
    }

    .task-name {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 400;
      color: var(--text-mid);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-cell.complete .task-name { color: var(--green); }
    .task-cell.running .task-name  { color: var(--amber); }
    .task-cell.failed .task-name   { color: var(--red); }

    /* ═══════════ LOG AREA ═══════════ */
    .log-area {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .log-header {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      gap: 8px;
      flex-shrink: 0;
    }

    .log-header-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .log-header-count {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    .log-output {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 16px;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.65;
    }

    .log-output::-webkit-scrollbar { width: 6px; }
    .log-output::-webkit-scrollbar-track { background: transparent; }
    .log-output::-webkit-scrollbar-thumb { background: var(--border-lit); border-radius: 3px; }

    .log-line {
      display: flex;
      gap: 0;
      padding: 1px 0;
    }

    .log-task {
      color: var(--cyan);
      min-width: 180px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .log-text {
      color: var(--text-mid);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .log-empty {
      color: var(--text-dim);
      font-style: italic;
      padding: 30px 0;
      text-align: center;
      font-family: var(--font-ui);
      font-size: 13px;
    }

    /* Completion banner */
    .complete-banner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 20px;
      margin: 0 20px 12px;
      border-radius: 6px;
      font-weight: 500;
      font-size: 13px;
      animation: fadeIn 0.4s ease;
    }

    .complete-banner.success {
      background: var(--green-dim);
      border: 1px solid rgba(0,245,144,0.2);
      color: var(--green);
    }

    .complete-banner.failure {
      background: var(--red-dim);
      border: 1px solid rgba(255,68,102,0.2);
      color: var(--red);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text-dim);
    }

    .empty-state-icon {
      font-size: 48px;
      opacity: 0.15;
      line-height: 1;
    }

    .empty-state-text {
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    .empty-state-hint {
      font-size: 12px;
      color: var(--text-dim);
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div id="app" x-data="app">
    <!-- HEADER -->
    <header class="header">
      <div class="logo">SRA5<span>Stock Research Agent</span></div>
      <div class="header-spacer"></div>

      <form class="ticker-form" @submit.prevent="startRun">
        <input
          class="ticker-input"
          type="text"
          x-model="ticker"
          placeholder="Ticker"
          maxlength="10"
          :disabled="running"
          autofocus
        >
        <button
          class="run-btn"
          :class="{ running }"
          :disabled="running || !ticker.trim()"
          type="submit"
          x-text="running ? 'Running...' : 'Run'"
        ></button>
      </form>
    </header>

    <!-- BODY -->
    <div class="body">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-title">Reports</div>
        <div class="sidebar-list">
          <template x-if="reports.length === 0">
            <div class="sidebar-empty">No reports yet</div>
          </template>
          <template x-for="r in reports" :key="r.run_id">
            <div class="report-item" @click="openReport(r.run_id)">
              <div class="report-dot"></div>
              <div class="report-ticker" x-text="r.ticker"></div>
              <div class="report-date" x-text="formatDate(r.date)"></div>
            </div>
          </template>
        </div>
      </aside>

      <!-- Main -->
      <div class="main">
        <!-- Status panel: visible when we have a run -->
        <template x-if="runId">
          <div class="status-panel">
            <div class="status-header">
              <div class="status-ticker" x-text="currentTicker"></div>
              <div class="status-label" :class="pipelineState" x-text="pipelineState"></div>
              <div class="status-spacer"></div>
              <div class="progress-wrap">
                <div class="progress-pct" x-text="progress + '%'"></div>
                <div class="progress-bar">
                  <div class="progress-fill" :style="'width:' + progress + '%'"></div>
                </div>
              </div>
            </div>

            <div class="task-grid">
              <template x-for="t in tasks" :key="t.id">
                <div class="task-cell" :class="t.status">
                  <template x-if="t.status === 'running'">
                    <div class="pulse-dot"></div>
                  </template>
                  <template x-if="t.status !== 'running'">
                    <div class="task-icon" :class="t.status" x-text="taskIcon(t.status)"></div>
                  </template>
                  <div class="task-name" x-text="t.id.replace(/_/g, ' ')"></div>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- Empty state (no run yet) -->
        <template x-if="!runId">
          <div class="empty-state">
            <div class="empty-state-icon">&#x25C8;</div>
            <div class="empty-state-text">Enter a ticker to start research</div>
            <div class="empty-state-hint">Results stream in real-time</div>
          </div>
        </template>

        <!-- Log area (during/after run) -->
        <template x-if="runId">
          <div class="log-area">
            <template x-if="completionResult !== null">
              <div class="complete-banner" :class="completionResult.success ? 'success' : 'failure'">
                <span x-text="completionResult.success ? 'Research complete \u2014 report opened in Typora' : 'Pipeline failed'"></span>
              </div>
            </template>

            <div class="log-header">
              <div class="log-header-title">Output</div>
              <div class="log-header-count" x-text="'(' + logs.length + ' entries)'"></div>
            </div>

            <div class="log-output" x-ref="logArea">
              <template x-if="logs.length === 0 && running">
                <div class="log-empty">Waiting for output...</div>
              </template>
              <template x-for="(entry, i) in logs" :key="i">
                <div class="log-line">
                  <span class="log-task" x-text="entry.task + ' \u2502 '"></span>
                  <span class="log-text" x-text="entry.text"></span>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('app', () => ({
        ticker: '',
        runId: null,
        status: null,
        logs: [],
        reports: [],
        running: false,
        ws: null,
        pollInterval: null,
        completionResult: null,

        async init() {
          try {
            this.reports = await (await fetch('/reports')).json();
          } catch (e) {
            console.warn('Failed to load reports:', e);
          }
        },

        get currentTicker() {
          if (!this.runId) return '';
          return this.runId.split('_')[0];
        },

        get tasks() {
          if (!this.status?.task_details) return [];
          return this.status.task_details;
        },

        get progress() {
          if (!this.status?.task_details) return 0;
          const total = this.status.task_details.length;
          if (total === 0) return 0;
          const done = this.status.task_details.filter(t => t.status === 'complete').length;
          return Math.round((done / total) * 100);
        },

        get pipelineState() {
          if (this.completionResult) {
            return this.completionResult.success ? 'complete' : 'failed';
          }
          if (this.running) return 'running';
          return 'idle';
        },

        taskIcon(status) {
          const icons = { pending: '\u25CB', complete: '\u2713', failed: '\u2717' };
          return icons[status] || '\u25CB';
        },

        formatDate(dateStr) {
          if (!dateStr || dateStr.length !== 8) return dateStr;
          return dateStr.slice(0, 4) + '-' + dateStr.slice(4, 6) + '-' + dateStr.slice(6);
        },

        async startRun() {
          const t = this.ticker.trim().toUpperCase();
          if (!t || this.running) return;

          this.completionResult = null;
          this.logs = [];
          this.status = null;

          try {
            const res = await fetch('/run', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ ticker: t }),
            });
            const data = await res.json();
            if (data.detail || data.error) {
              alert(data.detail || data.error);
              return;
            }
            this.runId = data.run_id;
            this.running = true;
            this.connectWs();
            this.startPolling();
          } catch (e) {
            alert('Cannot reach server. Is uvicorn running?\n\nStart with: uv run uvicorn web:app --reload --port 8000');
          }
        },

        connectWs() {
          if (this.ws) {
            this.ws.onclose = null;
            this.ws.close();
          }
          const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
          this.ws = new WebSocket(`${proto}//${location.host}/ws/${this.runId}`);

          this.ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);

            if (msg.type === 'log') {
              const lines = msg.text.split('\n').filter(l => l.trim());
              for (const line of lines) {
                this.logs.push({ task: msg.task, text: line });
              }
              this.$nextTick(() => {
                const el = this.$refs.logArea;
                if (el) el.scrollTop = el.scrollHeight;
              });
            } else if (msg.type === 'complete') {
              this.running = false;
              this.completionResult = msg;
              this.stopPolling();
              this.refreshReports();
            } else if (msg.type === 'error') {
              this.running = false;
              this.stopPolling();
              alert('WebSocket error: ' + msg.text);
            }
          };

          this.ws.onclose = () => {
            if (this.running) {
              setTimeout(() => this.connectWs(), 2000);
            }
          };
        },

        startPolling() {
          this.stopPolling();
          this.pollStatus();
          this.pollInterval = setInterval(() => this.pollStatus(), 2000);
        },

        async pollStatus() {
          if (!this.runId) return;
          try {
            const res = await fetch(`/status/${this.runId}`);
            if (res.ok) {
              this.status = await res.json();
            }
          } catch {}
        },

        stopPolling() {
          if (this.pollInterval) {
            clearInterval(this.pollInterval);
            this.pollInterval = null;
          }
        },

        async refreshReports() {
          try {
            this.reports = await (await fetch('/reports')).json();
          } catch {}
        },

        async openReport(runId) {
          try {
            await fetch(`/open/${runId}`, { method: 'POST' });
          } catch (e) {
            alert('Failed to open report: ' + e.message);
          }
        },
      }));
    });
  </script>
</body>
</html>
